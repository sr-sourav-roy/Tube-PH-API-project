<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ph Tube</title>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <header>
      <!-- top nav-ber -->
      <nav
        class="w-11/12 mx-auto flex justify-between items-center border-b-2 border-[#17171720] py-5"
      >
        <div class="tube">
          <img class="w-[120px]" src="./assests/Logo.png" alt="" />
        </div>
        <div class="short">
          <button class="btn bg-[#25252520]">Sort by view</button>
        </div>
        <div class="blog">
          <button class="btn bg-[#FF1F3D] text-white rounded-md">Blog</button>
        </div>
      </nav>
    </header>

    <!-- btn nav-ber -->
    <nav id="Category-container" class="flex justify-center py-4 gap-10">
      <div>
        <button
          onclick="loadVideo()"
          class="btn btn-sm bg-[#FF1F3D] hover:bg-slate-400 p-4 text-white"
        >
          All
        </button>
      </div>
    </nav>

    <!-- section btn -->

    <section
      class="w-11/12 mx-auto grid grid-cols-4 gap-y-5 mt-5 mb-6 gap-5"
      id="video-container"
    ></section>
    <!-- script -->
    <script src="./scripts/index.js"></script>
  </body>
</html>
