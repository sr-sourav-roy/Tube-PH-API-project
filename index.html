<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ph Tube</title>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      .active {
        background: #ff1f3d;
        color: white;
      }
    </style>
  </head>
  <body>
    <header>
      <!-- top nav-ber -->
      <nav
        class="w-11/12 mx-auto flex justify-between items-center border-b-2 border-[#17171720] py-5"
      >
        <div class="tube">
          <img class="w-[120px]" src="./assests/Logo.png" alt="" />
        </div>
        <div class="short">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input
              id="search-input"
              type="search"
              required
              placeholder="Search"
            />
          </label>
        </div>
        <div class="blog">
          <button class="btn bg-[#FF1F3D] text-white rounded-md">
            Sort by view
          </button>
        </div>
      </nav>
    </header>

    <!-- btn nav-ber -->
    <nav id="Category-container" class="flex justify-center py-4 gap-10">
      <div>
        <button
          id="bttn-all"
          onclick="loadVideo()"
          class="btn btn-sm hover:bg-slate-400 p-4"
        >
          All
        </button>
      </div>
    </nav>

    <!-- section btn -->

    <section
      class="w-11/12 mx-auto grid grid-cols-4 gap-y-5 mt-5 mb-6 gap-5"
      id="video-container"
    >
      <!-- this random options: -->
      <div
        class="col-span-full flex justify-center items-center flex-col py-20"
      >
        <img class="w-[200px]" src="./assests/Icon.png" alt="" />
        <h2 class="text-3xl font-bold">
          Oops!! Sorry, There is no content here
        </h2>
      </div>
    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="video_details" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="details_cardContainer"></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn bg-red-500">Close</button>
          </form>
        </div>
      </div>
    </dialog>
    <!-- script -->
    <script src="./scripts/index.js"></script>
  </body>
</html>
